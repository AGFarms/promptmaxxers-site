name = "promptmaxxers-webhook"
main = "src/index.ts"
compatibility_date = "2026-05-21"

# Custom domain — created automatically once you `wrangler deploy`
# AND record #4 (CNAME webhook → *.workers.dev) exists in Cloudflare DNS.
routes = [
  { pattern = "webhook.promptmaxxers.com/*", custom_domain = true }
]

# Set these as Cloudflare Worker secrets BEFORE deploy:
#   wrangler secret put CAL_WEBHOOK_SECRET     # generate: openssl rand -hex 32
#   wrangler secret put TELEGRAM_BOT_TOKEN     # from @BotFather
#   wrangler secret put TELEGRAM_CHAT_ID       # numeric chat id or @channel

[observability]
enabled = true
